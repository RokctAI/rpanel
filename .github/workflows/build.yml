name: Build (Smart)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_BREAK_SYSTEM_PACKAGES: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: write-all

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

      build-type:
        description: 'Build Type (apk/appbundle) - Ignored for Node'
        required: true
        default: 'apk'
        type: choice
        options:
        - apk
        - appbundle
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14.2'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '16'
      db-type:
        type: string
        default: 'postgres'
      version_format:
        type: string
        default: '##.##.##'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"

jobs:
  # --- 1. DETECT PROJECT TYPE ---
  detect:
    runs-on: ubuntu-latest
    container: python:3.14-slim
    outputs:
      is_flutter: ${{ steps.check.outputs.is_flutter }}
      is_node: ${{ steps.check.outputs.is_node }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v4
      - name: Check Project Type
        id: check
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "Flutter project detected."
             echo "is_flutter=true" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "Node.js project detected."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=true" >> "$GITHUB_OUTPUT"
          else
             echo "Unknown project type. Skipping builds."
             echo "is_flutter=false" >> "$GITHUB_OUTPUT"
             echo "is_node=false" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE (Smart) ---
  pipeline:
    needs: detect
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      project_type: ${{ needs.detect.outputs.is_flutter == 'true' && 'flutter' || (needs.detect.outputs.is_node == 'true' && 'node' || 'frappe') }}
      install-erpnext: true
      install-payments: true
      # Quality Gate Toggles
      run_security: true
      run_lint: true
      run_ci: true
      # Deployment Configuration (Immediate release on Main)
      release_strategy: 'weekly'
      # Environment configuration
      node-version: ${{ inputs.node-version || '24' }}
      python-version: ${{ inputs.python-version || '3.14.2' }}
      mariadb-version: ${{ inputs.mariadb-version || '10.6' }}
      postgres-version: ${{ inputs.postgres-version || '16' }}
      db-type: 'postgres'
      version_format: ${{ inputs.version_format || '##.##.##' }}
      bootstrap: true
      # --- Credentials ---
      # For Golden Seed generation: Ensures CI DB password matches Monorepo .env/production.env
    secrets: inherit

  docker-release:
    needs: pipeline
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git rsync
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
           path: docker-context

      - name: Checkout Monorepo for Overrides
        if: github.repository_owner == 'RokctAI'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: RokctAI/Monorepo
          path: docker-context/monorepo_overrides
          token: ${{ secrets.MONOREPO_PAT || github.token }}



      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.MONOREPO_PAT }}

      - name: Build Context Staging
        run: |
          # Copy the current repository's code (the code being tested) into the docker context
          # Exclude the docker-context folder itself to avoid recursion
          rsync -a --exclude 'docker-context' . ./docker-context/current_repo/

      - name: Extract Version
        id: meta
        run: |
          VERSION=$(grep "__version__" docker-context/rpanel/__init__.py | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extract version: $VERSION"

      - name: Build and Push Control Hub (Full)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/Dockerfile
          target: full
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-control:latest
            ghcr.io/rokctai/monorepo/rpanel-control:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}

      - name: Build and Push Tenant Spoke (Tenant)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/Dockerfile
          target: tenant
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-tenant:latest
            ghcr.io/rokctai/monorepo/rpanel-tenant:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}

      - name: Build and Push IoT Spoke (IoT)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/Dockerfile
          target: iot
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-iot:latest
            ghcr.io/rokctai/monorepo/rpanel-iot:${{ steps.meta.outputs.version }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.MONOREPO_PAT || github.token }}
            IS_ROKCTAI_REPO=${{ github.repository_owner == 'RokctAI' && 'true' || 'false' }}

      - name: Build and Push Postgres (Custom)
        uses: docker/build-push-action@v4
        with:
          context: docker-context
          file: docker-context/postgres.Dockerfile
          push: true
          tags: |
            ghcr.io/rokctai/monorepo/rpanel-db:latest
            ghcr.io/rokctai/monorepo/rpanel-db:${{ steps.meta.outputs.version }}

  upgrade-test:
    needs: [pipeline, docker-release]
    uses: RokctAI/shared-workflows/.github/workflows/universal-upgrade-test.yml@main
    with:
      current_version: ${{ needs.docker-release.outputs.version }}
    secrets: inherit
