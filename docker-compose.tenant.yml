version: '3.8'

# RokctAI: Tenant Spoke Template
# This file is used as a template by the Control Hub to spin up isolated tenants.

services:
  db:
    image: ghcr.io/rokctai/monorepo/rpanel-db:latest
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=postgres
    volumes:
      - tenant-db-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M # DB limit for the trial/shared phase
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          memory: 64M
    volumes:
      - tenant-redis-data:/data

  app:
    image: ghcr.io/rokctai/monorepo/rpanel-tenant:latest
    environment:
      - MODE=api
      - SITE_NAME=${SITE_NAME}
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - INSTALL_APPS=${INSTALL_APPS}
      - REDIS_CACHE=redis://redis:6379/0
      - REDIS_QUEUE=redis://redis:6379/1
      - REDIS_SOCKETIO=redis://redis:6379/2
    volumes:
      - tenant-sites:/home/frappe/frappe-bench/sites
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G # Limits the tenant to mimic a small VPS environment

volumes:
  tenant-db-data:
  tenant-redis-data:
  tenant-sites:
